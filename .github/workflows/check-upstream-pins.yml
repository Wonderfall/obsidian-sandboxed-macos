name: Check upstream pins

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1,4"

permissions: {}

env:
  BASE_BRANCH: ${{ github.event.repository.default_branch }}
  UPSTREAM_PIN_MIN_RELEASE_AGE_DAYS: "4"
  UPSTREAM_PIN_RELEASE_SCAN_COUNT: "10"

concurrency:
  group: check-upstream-pins
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name == 'schedule' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    name: Check upstream pins
    runs-on: macos-26
    permissions: {}
    steps:
      - name: Check out repository
        shell: zsh {0}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "refs/heads/${BASE_BRANCH}"
          git checkout --detach FETCH_HEAD

      - name: Check upstream pins
        id: pins
        shell: zsh {0}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          /bin/mkdir -p artifacts
          print -r -- "::add-mask::$GITHUB_TOKEN"

          ./tools/check-upstream-pins.zsh --write --summary artifacts/upstream-pin-check.md

          changed_files=()
          while IFS= read -r file; do
            [[ -n "$file" ]] && changed_files+=("$file")
          done < <(
            {
              git diff --name-only
              git diff --cached --name-only
            } | /usr/bin/sort -u
          )

          for file in "${changed_files[@]}"; do
            if [[ "$file" != "pins.conf" ]]; then
              print -r -- "unexpected modified file: $file" >&2
              exit 1
            fi
          done

          if (( ${#changed_files[@]} == 0 )); then
            print -r -- "changed=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          candidate_sha256="$(/usr/bin/shasum -a 256 pins.conf | /usr/bin/awk '{ print $1 }')"
          {
            print -r -- ""
            print -r -- "## Candidate pins.conf"
            print -r -- ""
            print -r -- "SHA-256: \`$candidate_sha256\`"
            print -r -- ""
            print -r -- "```diff"
            git diff -- pins.conf
            print -r -- "```"
            print -r -- ""
            print -r -- "## Maintainer action"
            print -r -- ""
            print -r -- "Run locally from a trusted checkout:"
            print -r -- ""
            print -r -- "```sh"
            print -r -- "./tools/check-upstream-pins.zsh --write"
            print -r -- "./build-sandboxed-obsidian.zsh"
            print -r -- "```"
          } >> artifacts/upstream-pin-check.md

          print -r -- "changed=1" >> "$GITHUB_OUTPUT"

      - name: Publish check summary
        if: always()
        shell: zsh {0}
        run: |
          set -euo pipefail
          if [[ -f artifacts/upstream-pin-check.md ]]; then
            /bin/cat artifacts/upstream-pin-check.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail when pin updates are available
        if: steps.pins.outputs.changed == '1'
        shell: zsh {0}
        run: |
          set -euo pipefail
          print -r -- "upstream pin updates are available; see the workflow summary and verify locally" >&2
          exit 1
