name: Build

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "43 5 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Build sandboxed app
    runs-on: macos-26
    permissions: {}
    steps:
      - name: Check out repository
        shell: zsh {0}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="$GITHUB_REF"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$checkout_ref"
          git checkout --detach FETCH_HEAD

      - name: Check shell failure propagation
        shell: zsh {0}
        run: |
          set -euo pipefail
          ./build-sandboxed-obsidian.zsh --self-test

      - name: Build and verify
        shell: zsh {0}
        env:
          SIGN_IDENTITY: "-"
          SIGN_TIMESTAMP: "0"
        run: |
          set -euo pipefail
          ./build-sandboxed-obsidian.zsh
